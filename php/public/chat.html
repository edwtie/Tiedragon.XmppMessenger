<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111827">
  <title>Tiedragon XMPP Web Client</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="chat-client.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">TX</div>
        <div>
          <h1>Tiedragon XMPP</h1>
          <span id="connectionSummary" data-i18n="status.disconnected">Disconnected</span>
        </div>
      </div>
      <div class="top-actions" role="toolbar" aria-label="Connection actions">
        <button id="themeButton" class="theme-button" type="button" title="Switch light/dark mode" aria-label="Switch light/dark mode">Theme: Dark</button>
        <button id="connectButton" type="button" data-i18n="button.connect">Connect</button>
        <button id="disconnectButton" type="button" disabled data-i18n="button.disconnect">Disconnect</button>
      </div>
    </header>

    <main class="client-grid">
      <aside class="conversation-list" aria-label="Conversations">
        <div class="section-heading">
          <span data-i18n="section.conversations">Conversations</span>
          <button id="addConversationButton" type="button" title="Add conversation">+</button>
        </div>
        <div id="conversationItems" class="conversation-items"></div>
      </aside>

      <section class="chat-panel" aria-label="Chat">
        <div id="dropOverlay" class="drop-overlay" hidden>
          <div>
            <strong data-i18n="upload.drop_title">Drop files here</strong>
            <span data-i18n="upload.drop_text">Files will be uploaded and shared in this chat.</span>
          </div>
        </div>
        <nav id="appTabs" class="app-tabs" aria-label="Teletyptel tabs"></nav>

        <div class="chat-header">
          <div>
            <h2 id="activeConversationName">Relay room</h2>
            <span id="activeConversationMeta">Local PHP relay</span>
          </div>
          <div class="chat-header-actions">
            <div class="call-controls" role="toolbar" aria-label="Call controls">
              <button id="startAudioCallButton" type="button" data-i18n="button.audio_call">Audio call</button>
              <button id="startVideoCallButton" type="button" data-i18n="button.video_call">Video call</button>
              <button id="answerCallButton" type="button" hidden data-i18n="button.answer_call">Answer</button>
              <button id="rejectCallButton" type="button" hidden data-i18n="button.reject_call">Reject</button>
              <button id="hangupCallButton" type="button" disabled data-i18n="button.hangup_call">Hang up</button>
              <span id="callStatus" class="call-status" data-i18n="call.idle">No call</span>
            </div>
            <div class="mode-switch" role="tablist" aria-label="Transport mode">
              <button id="relayModeButton" type="button" class="selected" data-i18n="mode.relay">Relay</button>
              <button id="xmppModeButton" type="button">RFC 7395</button>
            </div>
          </div>
        </div>

        <section id="callPanel" class="call-panel" hidden aria-label="Call media">
          <video id="remoteVideo" autoplay playsinline></video>
          <video id="localVideo" autoplay muted playsinline></video>
        </section>

        <div id="messageTimeline" class="message-timeline" aria-live="polite"></div>

        <section id="tabPanel" class="tab-panel" hidden>
          <div class="tab-panel-header">
            <div>
              <h2 id="tabPanelTitle">Tab</h2>
              <span id="tabPanelMeta"></span>
            </div>
            <button id="closeTabPanelButton" type="button">Back to chat</button>
          </div>
          <div id="tabPanelBody" class="tab-panel-body"></div>
        </section>

        <div id="remoteDraft" class="remote-draft" hidden>
          <span id="remoteDraftName">Remote</span>
          <p id="remoteDraftText"></p>
        </div>

        <form id="composerForm" class="composer">
          <div class="composer-tools" role="toolbar" aria-label="Message tools">
            <button id="resetRttButton" type="button" data-i18n="button.reset_rtt">Reset RTT</button>
            <button id="composerAudioCallButton" type="button" data-i18n="button.audio_call">Audio call</button>
            <button id="composerVideoCallButton" type="button" data-i18n="button.video_call">Video call</button>
            <button id="uploadFileButton" type="button" data-i18n="button.upload_file">Upload file</button>
            <input id="fileInput" class="file-input" type="file">
            <label class="toggle">
              <input id="rttToggle" type="checkbox" checked>
              <span data-i18n="option.live_rtt">Live RTT</span>
            </label>
            <label class="toggle">
              <input id="smileyToggle" type="checkbox" checked>
              <span data-i18n="option.smilies">Smilies</span>
            </label>
          </div>
          <textarea id="messageInput" rows="4" spellcheck="true" placeholder="Type a message" data-i18n-placeholder="placeholder.message"></textarea>
          <div class="send-row">
            <span id="composerState" data-i18n="composer.relay_state">Enter sends, Shift+Enter inserts a line</span>
            <button id="sendButton" type="submit" data-i18n="button.send">Send</button>
          </div>
        </form>
      </section>

      <aside class="detail-panel" aria-label="Connection and debug">
        <section class="settings-section">
          <h2 data-i18n="section.connection">Connection</h2>
          <label>
            <span data-i18n="label.relay_websocket">Relay WebSocket</span>
            <input id="relayUrlInput" value="ws://127.0.0.1:8787">
          </label>
          <label>
            <span data-i18n="label.display_name">Display name</span>
            <input id="displayNameInput" value="Edward">
          </label>
          <label>
            JID
            <input id="jidInput" value="edward@localhost/web">
          </label>
          <label>
            <span data-i18n="label.password">Password</span>
            <input id="passwordInput" type="password" autocomplete="current-password" value="">
          </label>
          <label class="toggle">
            <input id="rememberPasswordToggle" type="checkbox">
            <span data-i18n="option.remember_password">Remember password locally</span>
          </label>
          <label>
            <span data-i18n="label.peer">Peer</span>
            <input id="peerInput" value="relay@localhost">
          </label>
          <label>
            <span data-i18n="label.phone">Phone</span>
            <input id="phoneInput" value="">
          </label>
          <label>
            <span data-i18n="label.language">Language</span>
            <select id="languageInput">
              <option value="ned">Nederlands</option>
              <option value="eng">English</option>
            </select>
          </label>
          <label>
            <span data-i18n="label.provider">Provider</span>
            <input id="providerInput" value="example-provider" readonly>
          </label>
          <div id="accountStatus" class="account-status" data-i18n="account.default_profile">Default account profile</div>
          <div class="button-row">
            <button id="saveAccountButton" type="button" data-i18n="button.save_account">Save account</button>
            <button id="resetAccountButton" type="button" data-i18n="button.reset">Reset</button>
          </div>
        </section>

        <section class="settings-section">
          <h2 data-i18n="section.provider">Provider</h2>
          <div id="providerSummary" class="provider-summary" data-i18n="provider.loading">Loading provider manifest...</div>
          <div id="capabilityList" class="capability-list"></div>
        </section>

        <section class="settings-section">
          <h2>RFC 7395</h2>
          <label>
            XMPP WebSocket
            <input id="xmppUrlInput" value="ws://127.0.0.1:8787">
          </label>
          <div class="button-row">
            <button id="xmppOpenButton" type="button" data-i18n="button.open_stream">Open stream</button>
            <button id="xmppCloseButton" type="button" disabled data-i18n="button.close">Close</button>
          </div>
        </section>

        <section class="settings-section grow">
          <div class="section-heading">
            <h2 data-i18n="section.debug_xml">Debug XML</h2>
            <button id="clearLogButton" type="button" data-i18n="button.clear">Clear</button>
          </div>
          <pre id="debugLog" class="debug-log"></pre>
        </section>
      </aside>
    </main>
  </div>

  <script src="chat-client.js"></script>
</body>
</html>
